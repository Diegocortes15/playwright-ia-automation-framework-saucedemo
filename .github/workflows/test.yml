name: Playwright Tests

on:
  pull_request:
    branches: [main, e2e-jira-from-issues]
  push:
    branches: [main, e2e-jira-from-issues]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium firefox webkit

      - name: Run tests
        env:
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          CI: 'true'
        run: npm test

      # Note: qase-map.json updates here are ephemeral on CI. The committed map is
      # refreshed when a developer runs `npm run tcms:sync` locally (see docs/tcms.md).
      - name: Sync test cases to Qase (merge only)
        if: ${{ always() && github.event_name == 'push' }}
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_PROJECT_CODE: ${{ secrets.QASE_PROJECT_CODE }}
        run: npm run tcms:sync

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
