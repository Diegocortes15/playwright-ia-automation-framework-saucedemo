name: To Be Automated
description: File a feature/test request that should be turned into Playwright tests via /from-issue.
title: '[TBA] '
labels: ['to-be-automated']
body:
  - type: markdown
    attributes:
      value: |
        Fill out this form to request automated test coverage. The `/from-issue` Claude Code skill will read this issue and generate a set of Playwright tests in a PR for human review.

        Tips:
        - **Feature** drives the test folder (`tests/<feature>/`). Use a short slug (e.g., `cart`, `checkout`, `login`).
        - **Acceptance Criteria** — one per line. The orchestrator decides which to automate and groups them into tests.
        - **Pages are inferred from your AC text.** Mention UI surfaces explicitly (e.g., "from the inventory page", "in the cart", "on the checkout overview"). `/from-issue` extracts which Page Objects are needed, reuses existing ones in `src/pages/`, and scaffolds any missing ones automatically — multi-page flows supported.

        **Before submitting, verify:**
        - [ ] Each AC describes ONE behavior (split "X and Y" into two separate ACs)
        - [ ] Each AC specifies the user role explicitly (e.g., "standard_user", "locked_out_user", "any logged-in user")
        - [ ] Each AC has a clear pass/fail criterion (avoid vague phrases like "looks good" or "works correctly")
        - [ ] You've considered NEGATIVE cases (failures, validation errors) AND EDGE cases (boundaries, unusual inputs) — `/from-issue` groups tests into Positive / Negative / Edge buckets
        - [ ] Each AC explicitly mentions WHERE in the app it happens ("from the cart", "on the checkout overview", etc.) so `/from-issue` can infer which Page Objects are needed

  - type: input
    id: feature
    attributes:
      label: Feature
      description: Short folder name (snake_case). Becomes `tests/<feature>/`.
      placeholder: cart
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Optional. As a / I want / so that.
      placeholder: |
        As a standard user
        I want to remove items from the cart
        so that I can adjust my order before checkout.
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: One AC per line. The orchestrator decides automation-worth and groups ACs into tests.
      placeholder: |
        AC 1: Standard user can remove a single item from the cart; cart badge updates.
        AC 2: Standard user can remove all items; cart is empty.
        AC 3: Visual aesthetic of the remove button — manual review only.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional context (related issues, edge cases, links).
    validations:
      required: false
